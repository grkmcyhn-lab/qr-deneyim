<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Deneyim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f0f0f0;
      padding: 1.5rem;
    }
    .container { width: 100%; max-width: 400px; }
    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }
    .label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2rem;
      text-align: center;
    }
    .lang-buttons { display: flex; gap: 10px; width: 100%; }
    .lang-btn {
      flex: 1;
      padding: 1.25rem 1rem;
      border: 1px solid #222;
      border-radius: 14px;
      background: #111;
      cursor: pointer;
      color: #f0f0f0;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }
    .lang-btn:hover { border-color: #444; background: #161616; }
    .lang-btn .flag { font-size: 28px; }
    .lang-btn .lname { font-size: 12px; color: #555; font-weight: 400; }

    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .type-btn {
      padding: 1rem 0.75rem;
      border: 1px solid #222;
      border-radius: 12px;
      background: #111;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      transition: all 0.15s;
      text-align: left;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .type-btn:hover, .type-btn.selected { border-color: #f0f0f0; color: #f0f0f0; background: #161616; }
    .type-btn .t-icon { font-size: 18px; }
    .type-btn .t-name { font-size: 13px; font-weight: 500; }
    .type-btn .t-desc { font-size: 11px; color: #555; }
    .type-btn.selected .t-desc { color: #888; }

    .main-btn {
      width: 100%;
      padding: 1rem;
      border: 1px solid #333;
      border-radius: 14px;
      background: #f0f0f0;
      color: #0a0a0a;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-top: 1.25rem;
      transition: background 0.15s;
    }
    .main-btn:hover { background: #ddd; }

    .hak-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      width: 100%;
    }
    .hak-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f0f0f0;
      transition: background 0.3s;
    }
    .hak-dot.used { background: #333; }
    .hak-label {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.08em;
      margin-left: 4px;
    }

    .content-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 1.5rem 1.25rem;
      width: 100%;
      margin-bottom: 1.25rem;
    }
    .content-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 3px 8px;
      margin-bottom: 1rem;
    }
    .content-text { font-size: 16px; line-height: 1.8; color: #e0e0e0; }

    .action-row { display: flex; gap: 10px; width: 100%; }
    .action-btn {
      flex: 1;
      padding: 0.85rem 0.5rem;
      border: 1px solid #222;
      border-radius: 10px;
      background: #111;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      transition: all 0.15s;
      text-align: center;
    }
    .action-btn:hover { border-color: #444; color: #f0f0f0; }

    .donate-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      text-align: center;
      transition: color 0.15s, border-color 0.15s;
      white-space: pre-line;
    }
    .donate-btn:hover { color: #aaa; border-color: #333; }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #444;
      margin-top: 1.5rem;
      padding: 0;
    }
    .back-btn:hover { color: #888; }

    /* Share nudge */
    .share-nudge {
      width: 100%;
      margin-top: 1rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 1.25rem;
      text-align: center;
    }
    .nudge-text {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .nudge-row { display: flex; gap: 8px; }
    .nudge-share {
      flex: 2;
      padding: 0.75rem;
      border: 1px solid #444;
      border-radius: 10px;
      background: transparent;
      color: #f0f0f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nudge-share:hover { background: #1a1a1a; }
    .nudge-skip {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      background: transparent;
      color: #444;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .nudge-skip:hover { color: #888; }

    .counter {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Dil -->
  <div class="screen active" id="lang-screen">
    <p class="label">Choose your language / Dilini seç</p>
    <div class="lang-buttons">
      <button class="lang-btn" onclick="selectLang('tr')">
        <span class="flag">🇹🇷</span>
        <span>Türkçe</span>
        <span class="lname">Devam et</span>
      </button>
      <button class="lang-btn" onclick="selectLang('en')">
        <span class="flag">🇬🇧</span>
        <span>English</span>
        <span class="lname">Continue</span>
      </button>
    </div>
  </div>

  <!-- Tür -->
  <div class="screen" id="type-screen">
    <p class="label" id="type-label"></p>
    <div class="type-grid" id="type-grid"></div>
    <button class="main-btn" id="gen-btn" onclick="generate()"></button>
  </div>

  <!-- İçerik -->
  <div class="screen" id="content-screen">
    <p class="counter" id="counter-txt"></p>
    <div class="hak-bar">
      <div class="hak-dot" id="dot1"></div>
      <div class="hak-dot" id="dot2"></div>
      <span class="hak-label" id="hak-label"></span>
    </div>
    <div class="content-card">
      <span class="content-tag" id="content-tag"></span>
      <p class="content-text" id="content-text"></p>
    </div>
    <div class="action-row">
      <button class="action-btn" id="share-btn" onclick="handleShare()"></button>
      <button class="action-btn" id="another-btn" onclick="generate()"></button>
    </div>
    <div class="share-nudge" id="share-nudge" style="display:none;">
      <p class="nudge-text" id="nudge-text"></p>
      <div class="nudge-row">
        <button class="nudge-share" id="nudge-share-btn" onclick="handleShare(); hideNudge()"></button>
        <button class="nudge-skip" id="nudge-skip-btn" onclick="hideNudge()"></button>
      </div>
    </div>
    <button class="donate-btn" id="donate-btn" onclick="handleDonate()"></button>
    <button class="back-btn" id="back-btn" onclick="goLang()"></button>
  </div>

</div>

        "Has there ever been a moment in your life where you said 'that's too much of a coincidence'? Was it really?",
        "Who left this card here? A person. Where is that person right now? Possibly very close to you.",
        "Whatever you're thinking right now, someone else on the other side of the world is thinking the exact same thing. At this exact moment. Mathematically, this is almost certain."
      ]
    }
  };

  const ui = {
    tr: {
      typeLabel: 'Ne duymak istiyorsun?',
      genBtn: 'Göster →',
      share: 'Paylaş',
      another: 'Bir tane daha',
      donate: 'Bu içerikler yolculuğunu biraz daha katlanılır yapıyorsa\nbir kahve bırak ☕',
      back: '← Geri',
      counter: n => `#${n}. okuma`,
      hakFull: '2 hakkın var',
      hakOne: '1 hakkın kaldı',
      hakDone: 'Hakkın bitti — ama devam et',
      nudgeText: 'Bu içeriği beğendiysen, biri daha görmek isteyebilir.',
      nudgeShare: 'Paylaş',
      nudgeSkip: 'Geç',
      tags: { confession: 'Anonim İtiraf', hack: 'Hayat Tüyosu', legend: 'Şehir Efsanesi', paranoia: 'Paranoya' }
    },
    en: {
      typeLabel: 'What do you want to hear?',
      genBtn: 'Show me →',
      share: 'Share',
      another: 'One more',
      donate: 'If these little moments make your commute slightly better,\nbuy me a coffee ☕',
      back: '← Back',
      counter: n => `reading #${n}`,
      hakFull: '2 reads left',
      hakOne: '1 read left',
      hakDone: 'Out of reads — but keep going',
      nudgeText: 'If you liked this, someone else might too.',
      nudgeShare: 'Share',
      nudgeSkip: 'Skip',
      tags: { confession: 'Anonymous Confession', hack: 'Life Hack', legend: 'Urban Legend', paranoia: 'Paranoia' }
    }
  };

  function show(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectLang(l) {
    lang = l;
    sessionCount = 0;
    const t = ui[l];
    document.getElementById('type-label').textContent = t.typeLabel;
    document.getElementById('gen-btn').textContent = t.genBtn;

    const grid = document.getElementById('type-grid');
    grid.innerHTML = '';
    categories[l].forEach((cat, i) => {
      const btn = document.createElement('button');
      btn.className = 'type-btn' + (i === 0 ? ' selected' : '');
      btn.id = 'btn-' + cat.id;
      btn.innerHTML = `<span class="t-icon">${cat.icon}</span><span class="t-name">${cat.name}</span><span class="t-desc">${cat.desc}</span>`;
      btn.onclick = () => selectType(cat.id);
      grid.appendChild(btn);
    });
    contentType = categories[l][0].id;
    show('type-screen');
  }

  function selectType(t) {
    contentType = t;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('btn-' + t).classList.add('selected');
  }

  function getRandom(arr, type) {
    let idx;
    do { idx = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && idx === lastIndex[type]);
    lastIndex[type] = idx;
    return arr[idx];
  }

  function updateHakBar() {
    const t = ui[lang];
    const d1 = document.getElementById('dot1');
    const d2 = document.getElementById('dot2');
    const label = document.getElementById('hak-label');
    if (sessionCount === 1) {
      d1.classList.remove('used');
      d2.classList.remove('used');
      label.textContent = t.hakFull;
    } else if (sessionCount === 2) {
      d1.classList.add('used');
      d2.classList.remove('used');
      label.textContent = t.hakOne;
    } else {
      d1.classList.add('used');
      d2.classList.add('used');
      label.textContent = t.hakDone;
    }
  }

  function generate() {
    sessionCount++;
    totalCount++;
    try { localStorage.setItem('qr_reads', totalCount); } catch(e) {}

    const arr = content[lang][contentType];
    const val = getRandom(arr, contentType);
    const t = ui[lang];

    document.getElementById('counter-txt').textContent = t.counter(totalCount);
    document.getElementById('content-tag').textContent = t.tags[contentType];
    document.getElementById('content-text').textContent = val;
    document.getElementById('share-btn').textContent = t.share;
    document.getElementById('another-btn').textContent = t.another;
    document.getElementById('donate-btn').textContent = t.donate;
    document.getElementById('back-btn').textContent = t.back;

    updateHakBar();

    // 3. içerikten itibaren soft share nudge göster
    const nudge = document.getElementById('share-nudge');
    if (sessionCount >= 3) {
      nudge.style.display = 'block';
      document.getElementById('nudge-text').textContent = t.nudgeText;
      document.getElementById('nudge-share-btn').textContent = t.nudgeShare;
      document.getElementById('nudge-skip-btn').textContent = t.nudgeSkip;
    } else {
      nudge.style.display = 'none';
    }

    show('content-screen');
  }

  function hideNudge() {
    document.getElementById('share-nudge').style.display = 'none';
  }

  function handleShare() {
    const text = document.getElementById('content-text').textContent;
    if (navigator.share) navigator.share({ text });
    else if (navigator.clipboard) navigator.clipboard.writeText(text);
  }

  function handleDonate() {
    alert(lang === 'tr' ? 'Yakında aktif olacak ☕' : 'Coming soon ☕');
  }

  function goLang() {
    sessionCount = 0;
    show('lang-screen');
  }
</script>
</body>
</html>
